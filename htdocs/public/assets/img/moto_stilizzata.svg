  <title id="title">Moto sportiva stilizzata</title>
  <desc id="desc">Illustrazione vettoriale minimal di una moto sportiva, scalabile e colorabile via CSS.</desc>

  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
